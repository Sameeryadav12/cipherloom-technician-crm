name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      # Prisma reads DATABASE_URL from env when loading schema; validate does not connect.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci_validate?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma validate
        run: pnpm --filter @cipherloom/backend exec prisma validate

      - name: Typecheck / lint
        run: pnpm lint

      - name: Build
        run: pnpm build
